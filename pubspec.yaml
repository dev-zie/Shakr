name: shakr
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  dartz: ^0.10.1
  equatable: ^2.0.8
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  lottie: ^3.3.2
  go_router: ^17.2.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  image_picker: ^1.2.1
  firebase_storage: ^13.3.0
  http: ^1.2.0
  intl: ^0.19.0
  lucide_icons_flutter: ^1.1.0
  vibration: ^3.1.8
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  device_info_plus: 11.1.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"